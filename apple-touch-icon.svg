<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background -->
  <rect width="180" height="180" rx="32" fill="#020508"/>
  <!-- Grid -->
  <line x1="0"   y1="90"  x2="180" y2="90"  stroke="#00c8f0" stroke-width="1" opacity="0.15"/>
  <line x1="90"  y1="0"   x2="90"  y2="180" stroke="#00c8f0" stroke-width="1" opacity="0.15"/>
  <line x1="0"   y1="45"  x2="180" y2="45"  stroke="#00c8f0" stroke-width="0.5" opacity="0.07"/>
  <line x1="0"   y1="135" x2="180" y2="135" stroke="#00c8f0" stroke-width="0.5" opacity="0.07"/>
  <line x1="45"  y1="0"   x2="45"  y2="180" stroke="#00c8f0" stroke-width="0.5" opacity="0.07"/>
  <line x1="135" y1="0"   x2="135" y2="180" stroke="#00c8f0" stroke-width="0.5" opacity="0.07"/>
  <!-- Outer glow ring -->
  <circle cx="90" cy="90" r="72" fill="none" stroke="rgba(0,200,240,0.12)" stroke-width="1"/>
  <!-- Shield -->
  <path d="M90 30 L140 52 L140 96 C140 124 90 150 90 150 C90 150 40 124 40 96 L40 52 Z"
        fill="rgba(0,200,240,0.07)" stroke="#00c8f0" stroke-width="3" stroke-linejoin="round"/>
  <!-- Inner shield -->
  <path d="M90 44 L128 62 L128 96 C128 116 90 136 90 136 C90 136 52 116 52 96 L52 62 Z"
        fill="rgba(0,200,240,0.04)"/>
  <!-- AS monogram -->
  <text x="90" y="112"
        text-anchor="middle"
        font-family="'SF Mono', 'Consolas', monospace"
        font-weight="800"
        font-size="44"
        letter-spacing="-2"
        fill="#00c8f0">AS</text>
</svg>
